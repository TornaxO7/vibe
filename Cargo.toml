[workspace]
members = ["vibe-cli", "vibe-daemon"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

toml = { version = "0.8", features = ["parse", "display"] }
serde = { version = "1", features = ["derive"] }

[profile.release-lto]
inherits = "release"
codegen-units = 1
lto = true
